syntax = "proto3";

package algovn.radio.v1;

option go_package = "github.com/the-algovn/protos/gen/go/algovn/radio/v1;radiov1";

// RadioService is the public radio product's contract (Tần Số 42). Slice 1
// carries the operator-only playlist + station-control surface (gateway
// prefix /radio, every route role:admin); the public listener RPCs
// (now-playing / queue) join this service in Slice 2. Spec:
// the-algovn/specs docs/superpowers/specs/2026-07-20-radio-v0-playlist-station-control-design.md
// v1 adds the listener request + AI-pick surface (SearchCandidates/RequestTrack/ListMyRequests).
service RadioService {
  rpc CreatePlaylist(CreatePlaylistRequest) returns (CreatePlaylistResponse);
  rpc ListPlaylists(ListPlaylistsRequest) returns (ListPlaylistsResponse);
  rpc GetPlaylist(GetPlaylistRequest) returns (GetPlaylistResponse);
  rpc RenamePlaylist(RenamePlaylistRequest) returns (RenamePlaylistResponse);
  rpc DeletePlaylist(DeletePlaylistRequest) returns (DeletePlaylistResponse);
  rpc AddTrack(AddTrackRequest) returns (AddTrackResponse);
  rpc RemoveTrack(RemoveTrackRequest) returns (RemoveTrackResponse);
  rpc ReorderTracks(ReorderTracksRequest) returns (ReorderTracksResponse);
  rpc GetStation(GetStationRequest) returns (GetStationResponse);
  rpc SetActivePlaylist(SetActivePlaylistRequest) returns (SetActivePlaylistResponse);
  rpc GoOnAir(GoOnAirRequest) returns (GoOnAirResponse);
  rpc GoOffAir(GoOffAirRequest) returns (GoOffAirResponse);

  // Slice 2 — public listener surface (gateway rule: anonymous).
  rpc GetNowPlaying(GetNowPlayingRequest) returns (GetNowPlayingResponse);
  rpc GetQueue(GetQueueRequest) returns (GetQueueResponse);
  rpc GetHistory(GetHistoryRequest) returns (GetHistoryResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // v1 — the self-programming station (gateway rule: authenticated). Spec:
  // the-algovn/specs docs/superpowers/specs/2026-07-21-radio-v1-self-programming-station-design.md
  rpc SearchCandidates(SearchCandidatesRequest) returns (SearchCandidatesResponse);
  rpc RequestTrack(RequestTrackRequest) returns (RequestTrackResponse);
  rpc ListMyRequests(ListMyRequestsRequest) returns (ListMyRequestsResponse);
}

message PlaylistSummary {
  string id = 1;                 // uuid
  string name = 2;
  int32 track_count = 3;
  int64 total_duration_s = 4;    // JSON string over REST
  bool is_active = 5;            // this playlist is station.active_playlist_id
  string created_at = 6;         // RFC3339
  string updated_at = 7;         // RFC3339
}

// A library track projected into a playlist. Ordering is authoritative in
// the repeated field order; position is informational (0-based, contiguous).
message PlaylistTrack {
  int32 position = 1;
  string yt_id = 2;
  string title = 3;
  string channel = 4;
  int64 duration_s = 5;          // JSON string over REST
}

message Playlist {
  PlaylistSummary summary = 1;
  repeated PlaylistTrack tracks = 2;  // ordered by position
}

message Station {
  string active_playlist_id = 1;    // "" when unset
  string active_playlist_name = 2;  // "" when unset
  int32 active_track_count = 3;     // 0 when unset
  bool on_air = 4;
  string on_air_since = 5;          // RFC3339, "" when off air — Slice 2's ear-sync anchor
}

message CreatePlaylistRequest {
  string name = 1;  // trimmed, non-blank, <= 200 runes
}
message CreatePlaylistResponse {
  PlaylistSummary summary = 1;
}

message ListPlaylistsRequest {}
message ListPlaylistsResponse {
  repeated PlaylistSummary playlists = 1;  // newest first
}

message GetPlaylistRequest {
  string id = 1;
}
message GetPlaylistResponse {
  Playlist playlist = 1;
}

message RenamePlaylistRequest {
  string id = 1;
  string name = 2;  // trimmed, non-blank, <= 200 runes
}
message RenamePlaylistResponse {
  PlaylistSummary summary = 1;
}

message DeletePlaylistRequest {
  string id = 1;
}
message DeletePlaylistResponse {}

message AddTrackRequest {
  string playlist_id = 1;
  string yt_id = 2;  // must exist in the library; already-present is an idempotent no-op
}
message AddTrackResponse {
  Playlist playlist = 1;
}

message RemoveTrackRequest {
  string playlist_id = 1;
  string yt_id = 2;
}
message RemoveTrackResponse {
  Playlist playlist = 1;
}

message ReorderTracksRequest {
  string playlist_id = 1;
  repeated string yt_ids = 2;  // must equal current membership as a set
}
message ReorderTracksResponse {
  Playlist playlist = 1;
}

message GetStationRequest {}
message GetStationResponse {
  Station station = 1;
}

message SetActivePlaylistRequest {
  string playlist_id = 1;  // must exist and be non-empty
}
message SetActivePlaylistResponse {
  Station station = 1;
}

message GoOnAirRequest {}
message GoOnAirResponse {
  Station station = 1;
}

message GoOffAirRequest {}
message GoOffAirResponse {
  Station station = 1;
}

// NowPlaying mirrors the /radio SPA's parser. duration_seconds and listeners
// are int32 on purpose: int64 would transcode to a JSON string and fail the
// SPA's typeof-number checks.
message NowPlaying {
  string kind = 1;             // always "track" in v0
  string title = 2;
  string artist = 3;           // library channel
  string thumbnail_url = 4;    // "" in v0 (not persisted at ingest)
  string dedication = 5;       // "" in v0
  string started_at = 6;       // RFC3339 — ear-sync anchor, sample-clock truth
  int32 duration_seconds = 7;
  int32 listeners = 8;
  // Provenance (v1.1): absent on shuffle plays — the bed has no story.
  string source = 9;             // "listener" | "ai" | absent (shuffle)
  string requested_by_name = 10; // display name; "" unless source=listener
  string reason = 11;            // the DJ's stated reason; "" unless source=ai
}

message GetNowPlayingRequest {}
message GetNowPlayingResponse {
  NowPlaying now_playing = 1;  // ABSENT means off-air (the wire rule)
}

message QueueItem {
  string title = 1;
  string artist = 2;
  string thumbnail_url = 3;
  bool has_dedication = 4;  // always false in v1 (no dedications yet)
  string source = 5;             // "listener" | "ai"
  string requested_by_name = 6;  // display name; "" for ai
  string reason = 7;  // the DJ's stated reason; "" unless source=ai
}

message GetQueueRequest {}
message GetQueueResponse {
  // Pending requests (approved + ready) in air order: listener requests
  // FIFO, then AI picks FIFO. Empty when the station is on shuffle.
  repeated QueueItem items = 1;
}

message HistoryItem {
  string title = 1;
  string artist = 2;
  string thumbnail_url = 3;
  string aired_at = 4;  // RFC3339
  // Provenance (v1.1). reason is carried for symmetry; the SPA renders
  // badges only in history.
  string source = 5;
  string requested_by_name = 6;
  string reason = 7;
}

message GetHistoryRequest {}
message GetHistoryResponse {
  repeated HistoryItem items = 1;  // last completed airings, newest first
}

message HeartbeatRequest {
  string session_id = 1;  // the SPA's per-tab UUID
}
message HeartbeatResponse {}

// A ranked YouTube search result the listener can request. duration_s is
// int32 on purpose: int64 would transcode to a JSON string and fail the
// SPA's typeof-number checks.
message Candidate {
  string yt_id = 1;
  string title = 2;
  string channel = 3;
  int32 duration_s = 4;
  string thumbnail_url = 5;
}

message SearchCandidatesRequest {
  string query = 1;  // trimmed, non-blank, <= 200 runes
}
message SearchCandidatesResponse {
  repeated Candidate candidates = 1;  // ranked, top 8
}

// TrackRequest is one queue/request record — a listener request or an AI
// pick. Statuses: approved | ready | aired | failed (spec §3).
message TrackRequest {
  string id = 1;                 // uuid
  string source = 2;             // "listener" | "ai"
  string requested_by_name = 3;  // server-derived display name; "" for ai
  string yt_id = 4;
  string title = 5;
  string channel = 6;
  int32 duration_s = 7;
  string thumbnail_url = 8;
  string status = 9;
  string fail_reason = 10;
  string created_at = 11;        // RFC3339
}

message RequestTrackRequest {
  Candidate candidate = 1;  // full snapshot of the picked search result
}
message RequestTrackResponse {
  TrackRequest request = 1;
}

message ListMyRequestsRequest {}
message ListMyRequestsResponse {
  repeated TrackRequest requests = 1;  // caller's requests, newest first, cap 50
}
